<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayfa Bulunamadı | PINFOX</title>
    <meta name="robots" content="noindex, follow">
    <link rel="stylesheet" href="/style.css">
    <style>
        .search-btn { transition: transform 0.2s ease, filter 0.2s ease !important; }
        .search-btn:hover { transform: translateY(-4px) !important; filter: brightness(1.15) drop-shadow(0 8px 14px rgba(0,0,0,0.5)) !important; }

        .error-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 20px;
            gap: 0;
        }

        .error-code {
            font-size: 160px;
            font-weight: 700;
            line-height: 1;
            margin: 0;
            background: linear-gradient(to bottom, #AEAE29, #5C5938);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -4px;
        }

        .error-title {
            font-size: 42px;
            font-weight: 700;
            margin: 8px 0 16px 0;
            color: white;
        }

        .error-desc {
            font-size: 28px;
            font-weight: 400;
            color: #8B8BAF;
            max-width: 480px;
            line-height: 1.4;
            margin: 0 0 48px 0;
        }

        .error-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .error-btn {
            height: 56px;
            padding: 0 32px;
            border: none;
            border-radius: 12px;
            font-family: 'Dense', sans-serif;
            font-size: 28px;
            font-weight: 400;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .error-btn.primary {
            background: linear-gradient(to bottom, #AEAE29, #5C5938);
            color: white;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.2) inset;
        }

        .error-btn.secondary {
            background: #272042;
            color: #8B8BAF;
            box-shadow: 0 0 0 1.5px rgba(255,255,255,0.07) inset;
        }

        .error-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.12) drop-shadow(0 6px 12px rgba(0,0,0,0.4));
        }

        .error-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VPQW1XT9Y7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VPQW1XT9Y7');
    </script>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header class="top-bar">
        <div class="top-left">
            <div class="logo">
                <a href="/index.html">
                    <img src="/assets/logo_pinfox.svg" alt="Pinfox Logo">
                </a>
            </div>
            <button class="lang glass-soft">TR</button>
        </div>
        <div class="search-section">
            <input class="glass-soft" type="text" placeholder="Araçları, oyunları veya fikirleri arayın...">
            <button class="search-btn glass-strong">
                <svg xmlns="http://www.w3.org/2000/svg" width="44.208" height="44.208" viewBox="0 0 44.208 44.208">
                    <path d="M13.127,36.266a2.654,2.654,0,0,1-2.656-2.656V25.985A13.045,13.045,0,0,1,6.313,24.35,13.15,13.15,0,0,1,.267,10.482,13.055,13.055,0,0,1,2.242,5.788,13.165,13.165,0,0,1,8.017,1.032,13.061,13.061,0,0,1,10.482.267a13.255,13.255,0,0,1,5.291,0,13.055,13.055,0,0,1,4.694,1.975,13.165,13.165,0,0,1,4.756,5.776,13.061,13.061,0,0,1,.765,2.464,13.225,13.225,0,0,1,.267,2.646,13.085,13.085,0,0,1-2.994,8.346,13.147,13.147,0,0,1-5.311,3.867,13.067,13.067,0,0,1-2.166.645V33.61a2.654,2.654,0,0,1-2.656,2.656Zm0-32.486a9.347,9.347,0,1,0,9.347,9.347A9.358,9.358,0,0,0,13.127,3.78Z" transform="translate(0 18.565) rotate(-45)" fill="#fff" opacity="0.42"/>
                </svg>
            </button>
        </div>
    </header>

    <div class="top-divider"></div>

    <!-- 404 İÇERİK -->
    <div class="error-section">
        <div class="error-icon">🔍</div>
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Sayfa Bulunamadı</h2>
        <p class="error-desc">Aradığın sayfa taşınmış, silinmiş ya da hiç var olmamış olabilir.</p>
        <div class="error-links">
            <a href="/index.html" class="error-btn primary">Ana Sayfaya Dön</a>
            <a href="/tools.html" class="error-btn secondary">Araçlara Bak</a>
        </div>
    </div>

</div>

</body>
</html>
